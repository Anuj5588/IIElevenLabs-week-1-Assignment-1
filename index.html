<html>
  <head>
    <title>Elevenlabs | Signup</title>
    <link href="./index.css" rel="stylesheet" />
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background: white;
        padding: 0;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div
        style="
          text-align: center;
          margin-top: 4%;
          font-size: 22px;
          font-weight: 700;
          color: #111111;
        "
      >
        IIElevenLabs
      </div>
    </header>

    <div
      style="
        background-color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 10%;
        min-height: 30vh;
        gap: 20px;
        justify-content: space-around;
      "
    >
      <div style="font-size: 22px; font-weight: 700; color: #111111">
        Create an Account
      </div>
      <div
        style="
          border: 1px solid #e5e5e5;
          padding: 10px;
          background: white;
          box-sizing: border-box;
          width: 300px;
          border-radius: 10px;
          display: flex;
          justify-items: center;
          align-items: center;
         
        "
      >
        <div>
            <img height="15px" width="15px" src="./assets/google.png" /></div>
        <div style="font-size: 13px; font-weight: 600; flex: 1; text-align: center;">Sign up with Google</div>
      </div>

      <div
        style="
          width: 300px;
          height: 2px;
          background: #e5e5e5;
          border-radius: 10px;
        "
      ></div>

      <div style="width: 300px;">
        <div style="color: #444444; font-weight: 600; font-size: 14px">
          Email
        </div>
        <div
          style="
            margin-top: 8px;
            width: 300px;
            box-sizing: border-box;
            border: 1px solid #e5e5e5;
            padding: 10px;
            background: white;
            border-radius: 10px;
          "
        >
          <input style="border: none; outline: none; background: transparent; width:100%;"/>
        </div>
      </div>

      <div style="width: 300px;">
        <div style="color: #444444; font-weight: 600; font-size: 14px">
          Password
        </div>
        <div
          style="
            margin-top: 8px;
            border: 1px solid #e5e5e5;
           width: 300px;
           box-sizing: border-box;
            padding: 10px;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-items: center;
            align-items: center;
          
          "
        >
          <div style="flex: 1;">
            <input
              style="border: none; outline: none; background: transparent; width: 100%;"
            />
          </div>
          <div>
            <img height="20px" width=20px src="./assets/view.png" />
          </div>
        </div>
      </div>

      <div>
        <div
          style="
            background-color: #b8b8c2;
            color: white;
            border: none;
            width: 280px;
            text-align: center;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 400;
          "
        >
          Sign up
        </div>
      </div>

      <div style="color: #555555; font-size: 14px; font-weight: 500px">
        Already registerd?
        <span
          style="font-weight: 600; color: #504e4e; text-decoration: underline"
          >Sign in</span
        >
      </div>
    </div>

    <footer>

    <div
  style="
    background-color: #f5f5f5;
    color: #7a7a7a;
    font-size: 13px;
    text-align: center;
    font-weight: 600;
    padding: 20px;
   margin-top: 10%;
  "
>
  By continuing, you agree to our
  <span style="font-weight: 600; color: #666666;text-decoration: underline;">
    Terms of Service
  </span>
  and
  <span style="font-weight: 600; color: #666666; text-decoration: underline;">
    Privacy Policy
  </span>.
</div>
    </footer>
  </body>
</html>
